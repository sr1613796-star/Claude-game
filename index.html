<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Shooter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #eee; overflow: hidden; }
  canvas { display: block; touch-action: none; -webkit-tap-highlight-color: transparent; }
  #ui { display: flex; justify-content: center; gap: 32px; padding: 10px 0 6px; font-size: 15px; width: 100%; }
</style>
</head>
<body>
<div id="ui"><span>Score: <b id="score">0</b></span><span>Lives: <b id="lives">♥♥♥</b></span><span>Level: <b id="level">1</b></span></div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const SIZE = Math.min(window.innerWidth, window.innerHeight - 80, 520);
canvas.width = SIZE;
canvas.height = Math.round(SIZE * 0.75);
const W = canvas.width, H = canvas.height;

let state = 'idle';
let score = 0, lives = 3, level = 1;
let player, bullets, enemies, particles, enemyBullets;
let shootCooldown = 0, lastTime = 0, animId;
let moveLeft = false, moveRight = false, shooting = false;

function init() {
  player = { x: W/2, y: H - 50, w: Math.round(W*0.06), h: Math.round(W*0.04), speed: W * 0.46 };
  bullets = []; enemies = []; particles = []; enemyBullets = [];
  score = 0; lives = 3; level = 1; shootCooldown = 0;
  spawnWave(); updateUI();
}

function spawnWave() {
  enemies = [];
  const cols = 8, rows = Math.min(2 + level, 5);
  const spacingX = W / (cols + 1);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      enemies.push({
        x: spacingX * (c + 1), y: 30 + r * 36,
        w: Math.round(W*0.058), h: Math.round(W*0.042),
        dx: W * (0.083 + level * 0.017),
        type: r === 0 ? 'elite' : 'basic',
        shootChance: 0.0003 + level * 0.0001
      });
    }
  }
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 40 + Math.random() * 80;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color });
  }
}

function drawShip(x, y, w, h, color, isPlayer) {
  ctx.save(); ctx.translate(x, y); ctx.fillStyle = color;
  if (isPlayer) {
    ctx.beginPath();
    ctx.moveTo(0,-h/2); ctx.lineTo(w/2,h/2); ctx.lineTo(w*0.15,h*0.2);
    ctx.lineTo(-w*0.15,h*0.2); ctx.lineTo(-w/2,h/2); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#4af'; ctx.fillRect(-3, h*0.05, 6, h*0.2);
  } else {
    ctx.beginPath();
    ctx.moveTo(0,h/2); ctx.lineTo(w/2,-h/2); ctx.lineTo(w*0.15,-h*0.1);
    ctx.lineTo(-w*0.15,-h*0.1); ctx.lineTo(-w/2,-h/2); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawMenu() {
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,W,H);
  for (let i = 0; i < 60; i++) {
    ctx.fillStyle = i%5===0 ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.3)';
    ctx.fillRect((i*137.5)%W, (i*89.3)%H, 1, 1);
  }
  ctx.fillStyle = '#4af';
  ctx.font = `bold ${Math.round(W*0.055)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('SPACE SHOOTER', W/2, H*0.35);

  const bw = W*0.5, bh = H*0.13, bx = W/2-bw/2, by = H*0.5;
  ctx.fillStyle = '#1a3a5a';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10); ctx.fill();
  ctx.strokeStyle = '#4af'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10); ctx.stroke();
  ctx.fillStyle = '#4af';
  ctx.font = `bold ${Math.round(W*0.045)}px monospace`;
  ctx.fillText('TAP TO PLAY', W/2, by + bh*0.65);

  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = `${Math.round(W*0.028)}px monospace`;
  ctx.fillText('tap left or right to move — auto shoots!', W/2, H*0.82);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#f84';
  ctx.font = `bold ${Math.round(W*0.06)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H*0.38);
  ctx.fillStyle = '#eee';
  ctx.font = `${Math.round(W*0.04)}px monospace`;
  ctx.fillText('Score: ' + score, W/2, H*0.5);

  const bw = W*0.5, bh = H*0.13, bx = W/2-bw/2, by = H*0.6;
  ctx.fillStyle = '#1a3a1a';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10); ctx.fill();
  ctx.strokeStyle = '#4f4'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10); ctx.stroke();
  ctx.fillStyle = '#4f4';
  ctx.font = `bold ${Math.round(W*0.042)}px monospace`;
  ctx.fillText('TAP TO RETRY', W/2, by + bh*0.65);
}

function update(dt) {
  shootCooldown -= dt;
  if (moveLeft && player.x - player.w/2 > 0) player.x -= player.speed * dt;
  if (moveRight && player.x + player.w/2 < W) player.x += player.speed * dt;
  if (shootCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - player.h/2, vy: -(H * 1.17) });
    shootCooldown = 0.18;
  }

  bullets.forEach(b => b.y += b.vy * dt);
  bullets = bullets.filter(b => b.y > 0);
  enemyBullets.forEach(b => b.y += b.vy * dt);
  enemyBullets = enemyBullets.filter(b => b.y < H);

  let edgeHit = false;
  enemies.forEach(e => { if (e.x - e.w/2 <= 2 || e.x + e.w/2 >= W-2) edgeHit = true; });
  if (edgeHit) enemies.forEach(e => { e.dx *= -1; e.y += 12; });
  enemies.forEach(e => {
    e.x += e.dx * dt;
    if (Math.random() < e.shootChance)
      enemyBullets.push({ x: e.x, y: e.y + e.h/2, vy: H * (0.44 + level * 0.056) });
  });

  for (let bi = bullets.length-1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ei = enemies.length-1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (Math.abs(b.x-e.x) < e.w/2 && Math.abs(b.y-e.y) < e.h/2) {
        score += e.type==='elite' ? 20 : 10;
        spawnParticles(e.x, e.y, e.type==='elite' ? '#f84' : '#4cf', 8);
        enemies.splice(ei,1); bullets.splice(bi,1); updateUI(); break;
      }
    }
  }

  for (let bi = enemyBullets.length-1; bi >= 0; bi--) {
    const b = enemyBullets[bi];
    if (Math.abs(b.x-player.x) < player.w/2 && Math.abs(b.y-player.y) < player.h/2) {
      lives--; spawnParticles(player.x, player.y, '#4af', 12);
      enemyBullets.splice(bi,1); updateUI();
      if (lives <= 0) { state='over'; cancelAnimationFrame(animId); drawGameOver(); return; }
    }
  }

  for (const e of enemies) {
    if (e.y + e.h/2 >= player.y - player.h/2) { state='over'; cancelAnimationFrame(animId); drawGameOver(); return; }
  }

  particles.forEach(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.9; p.vy*=0.9; p.life-=dt*2; });
  particles = particles.filter(p => p.life > 0);

  if (enemies.length === 0) { level++; spawnWave(); updateUI(); }
}

function drawGame() {
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,W,H);
  for (let i=0;i<60;i++) {
    ctx.fillStyle=i%5===0?'rgba(255,255,255,0.8)':'rgba(255,255,255,0.3)';
    ctx.fillRect((i*137.5+level*3)%W, (i*89.3+level*5)%H, 1,1);
  }
  enemies.forEach(e => drawShip(e.x,e.y,e.w,e.h,e.type==='elite'?'#f84':'#4cf',false));
  bullets.forEach(b => { ctx.fillStyle='#ffe066'; ctx.fillRect(b.x-2,b.y-8,4,14); });
  enemyBullets.forEach(b => { ctx.fillStyle='#f55'; ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill(); });
  drawShip(player.x,player.y,player.w,player.h,'#4af',true);
  particles.forEach(p => {
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,0.03)';
  ctx.fillRect(0, H*0.6, W*0.33, H*0.4);
  ctx.fillRect(W*0.67, H*0.6, W*0.33, H*0.4);
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fillRect(W*0.33, H*0.6, W*0.34, H*0.4);
}

function loop(ts) {
  if (state !== 'playing') return;
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;
  update(dt); drawGame();
  animId = requestAnimationFrame(loop);
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '♥'.repeat(Math.max(0,lives));
  document.getElementById('level').textContent = level;
}

function startGame() {
  moveLeft = false; moveRight = false; shooting = false;
  state = 'playing';
  init();
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
}

// Use Pointer Events — works on iPad Safari, desktop, Android
canvas.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  if (state === 'idle' || state === 'over') { startGame(); return; }
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  if (x < W*0.5) moveLeft = true;
  else moveRight = true;
}, { passive: false });

canvas.addEventListener('pointerup', function(e) {
  e.preventDefault();
  moveLeft = false; moveRight = false;
}, { passive: false });

canvas.addEventListener('pointermove', function(e) {
  if (e.buttons === 0 || state !== 'playing') return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (W / rect.width);
  moveLeft = false; moveRight = false;
  if (x < W*0.5) moveLeft = true;
  else moveRight = true;
}, { passive: false });

// Keyboard
document.addEventListener('keydown', e => {
  if (state !== 'playing') { startGame(); return; }
  if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') moveLeft=true;
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') moveRight=true;
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft'||e.key==='a'||e.key==='A') moveLeft=false;
  if (e.key==='ArrowRight'||e.key==='d'||e.key==='D') moveRight=false;
});

drawMenu();
</script>
</body>
</html>
